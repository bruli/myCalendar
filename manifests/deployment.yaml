apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: mycalendar
    labels:
        app: mycalendar
    name: mycalendar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycalendar
  strategy: {}
  template:
    metadata:
      labels:
        app: mycalendar
    spec:
      containers:
      - image: ghcr.io/bruli/mycalendar:0.1.3
        name: mycalendar
        imagePullPolicy: IfNotPresent
        ports:
            - name: http
              containerPort: 8080
            - name: callback
              containerPort: 8081
        volumeMounts:
            - name: app-data
              mountPath: /data
        env:
            - name: CLIENT_ID
              valueFrom:
                  secretKeyRef:
                      name: mycalendar-secret
                      key: CLIENT_ID
            - name: CLIENT_SECRET
              valueFrom:
                  secretKeyRef:
                      name: mycalendar-secret
                      key: CLIENT_SECRET
            - name: CALLBACK_HOST
              value: :8081
            - name: TOKENS_FILE
              value: /data/tokens.json
            - name: TELEGRAM_TOKEN
              valueFrom:
                  secretKeyRef:
                      name: mycalendar-secret
                      key: TELEGRAM_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                  secretKeyRef:
                      name: mycalendar-secret
                      key: TELEGRAM_CHAT_ID
            - name: SERVER_HOST
              value: :8080
        readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
        livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
        resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
          - name: app-data
            persistentVolumeClaim:
                claimName: mycalendar-data