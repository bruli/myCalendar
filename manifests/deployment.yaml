apiVersion: apps/v1
kind: Deployment
metadata:
    namespace: mycalendar
    labels:
        app: mycalendar
    name: mycalendar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mycalendar
  strategy:
      type: Recreate
  template:
    metadata:
      labels:
        app: mycalendar
    spec:
      containers:
      - image: ghcr.io/bruli/mycalendar:0.8.0
        name: mycalendar
        imagePullPolicy: IfNotPresent
        ports:
            - name: http
              containerPort: 8080
            - name: callback
              containerPort: 8081
        volumeMounts:
            - name: app-data
              mountPath: /data
        env:
            - name: CLIENT_ID
              valueFrom:
                  secretKeyRef:
                      name: google-secret
                      key: client_id
            - name: CLIENT_SECRET
              valueFrom:
                  secretKeyRef:
                      name: google-secret
                      key: client_secret
            - name: CALLBACK_HOST
              value: :8081
            - name: CALLBACK_URL
              value: https://mycalendar.bru-li.me/callback
            - name: TOKENS_FILE
              value: /data/tokens.json
            - name: SERVER_HOST
              value: :8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_TRACES_SAMPLER
              value: always_on
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: LOG_LEVEL
              value: error
            - name: NTFY_URL
              value: https://ntfy.bru-li.me
            - name: NTFY_TOPIC
              value: ws-ml
            - name: NTFY_USER
              valueFrom:
                  secretKeyRef:
                      name: ntfy-secret
                      key: user
            - name: NTFY_PASSWORD
              valueFrom:
                  secretKeyRef:
                      name: ntfy-secret
                      key: password
        readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
        livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
        resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
          - name: app-data
            persistentVolumeClaim:
                claimName: mycalendar-data